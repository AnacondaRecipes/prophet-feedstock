{% set name = "prophet" %}
{% set version = "1.1.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 97ef633a7d2d3bb7237f58b6990a68467c3c8089f605ea364b03f842ab3ea9cf

build:
  number: 0
  skip: true  # [py<37]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  binary_has_prefix_files:
    - {{ SP_DIR|replace("\\", "/") }}/stan_model/prophet_model.bin
  # To use our own cmdstan rather than download and build a different one:
  script_env:
    - PROPHET_REPACKAGE_CMDSTAN=false

requirements:
  build:
    - {{ compiler('cxx') }}  # [not win]
    - {{ compiler('m2w64_cxx') }}  # [win]
    - m2w64-make                   # [win]
    - m2-coreutils                 # [win]
  host:
    - pip
    - python
    - setuptools >=64
    - cmdstanpy >=1.0.4
    - tbb-devel
  run:
    - python
    - cmdstanpy >=1.0.4
    - numpy >=1.15.4
    - matplotlib-base >=2.0.0
    - pandas >=1.0.4
    - holidays >=0.25.0,<1
    - tqdm >=4.36.1
    - importlib_resources

test:
  imports:
    - prophet
    - prophet.diagnostics
    - prophet.forecaster
    - prophet.make_holidays
    - prophet.models
    - prophet.plot
    - prophet.serialize
    - prophet.utilities
  commands:
    - pip check
    - pytest --pyargs prophet.tests
  requires:
    - pip
    - pytest

about:
  home: https://facebook.github.io/prophet
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Automatic Forecasting Procedure
  description: |
    Implements a procedure for forecasting time series data based on an
    additive model where non-linear trends are fit with yearly, weekly, and
    daily seasonality, plus holiday effects. It works best with time series
    that have strong seasonal effects and several seasons of historical data.
    Prophet is robust to missing data and shifts in the trend, and typically
    handles outliers well.
  doc_url: https://facebook.github.io/prophet/docs/quick_start.html
  dev_url: https://github.com/facebook/prophet

extra:
  recipe-maintainers:
    - bletham
    - maresb
  skip-lints:
    - missing_pip_check
